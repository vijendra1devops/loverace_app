# ──────────────────────────────────────────────────────────────────────────────
# CI/CD: Frontend → ACR → Azure App Service
#
# Required GitHub secrets:
#   AZURE_CLIENT_ID          – Federated credential (OIDC) Service Principal
#   AZURE_TENANT_ID
#   AZURE_SUBSCRIPTION_ID
#   ACR_LOGIN_SERVER         – e.g. acrlovearaceprod.azurecr.io
#   AZURE_WEBAPP_NAME        – e.g. loverace-prod
#   AZURE_RESOURCE_GROUP     – e.g. rg-loverace-prod
#
# Optional (override API endpoints):
#   VITE_API_URL             – default: https://api.loverace.app
#   VITE_WS_URL              – default: wss://api.loverace.app
# ──────────────────────────────────────────────────────────────────────────────
name: Deploy Frontend → App Service

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  ACR:      ${{ secrets.ACR_LOGIN_SERVER }}
  APP_NAME: ${{ secrets.AZURE_WEBAPP_NAME }}
  RG:       ${{ secrets.AZURE_RESOURCE_GROUP }}
  IMAGE:    ${{ secrets.ACR_LOGIN_SERVER }}/loverace/frontend

jobs:
  build-push-deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR login
        run: az acr login --name ${{ env.ACR }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable=true

      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: frontend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=registry,ref=${{ env.IMAGE }}:buildcache
          cache-to:   type=registry,ref=${{ env.IMAGE }}:buildcache,mode=max
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL || 'https://api.loverace.app' }}
            VITE_WS_URL=${{ secrets.VITE_WS_URL || 'wss://api.loverace.app' }}
            VITE_MAP_STYLE_URL=https://tiles.openfreemap.org/styles/liberty
            VITE_DUMMY_DATA=false

      - name: Update App Service container image
        run: |
          az webapp config container set \
            --name ${{ env.APP_NAME }} \
            --resource-group ${{ env.RG }} \
            --docker-custom-image-name ${{ env.IMAGE }}:latest \
            --docker-registry-server-url https://${{ env.ACR }}

      - name: Restart App Service
        run: |
          az webapp restart \
            --name ${{ env.APP_NAME }} \
            --resource-group ${{ env.RG }}

      - name: Wait for App Service to come up
        run: |
          az webapp show \
            --name ${{ env.APP_NAME }} \
            --resource-group ${{ env.RG }} \
            --query "state" -o tsv
