# ──────────────────────────────────────────────────────────────────────────────
# CI/CD: Backend microservices → ACR → AKS
#
# Required GitHub secrets:
#   AZURE_CLIENT_ID          – Federated credential (OIDC) Service Principal
#   AZURE_TENANT_ID
#   AZURE_SUBSCRIPTION_ID
#   ACR_LOGIN_SERVER         – e.g. acrlovearaceprod.azurecr.io
#   AKS_RESOURCE_GROUP       – e.g. rg-loverace-prod
#   AKS_CLUSTER_NAME         – e.g. aks-loverace-prod
# ──────────────────────────────────────────────────────────────────────────────
name: Deploy Backend → AKS

on:
  push:
    branches: [main]
    paths:
      - 'services/**'
      - 'infra/k8s/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

permissions:
  id-token: write   # OIDC token for az login
  contents: read

env:
  ACR:       ${{ secrets.ACR_LOGIN_SERVER }}
  RG:        ${{ secrets.AKS_RESOURCE_GROUP }}
  AKS:       ${{ secrets.AKS_CLUSTER_NAME }}

jobs:
  build-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - name: core-api
            context: services/core_api
          - name: realtime-gateway
            context: services/realtime_gateway
    outputs:
      # Pass short SHA tag to deploy job
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR login
        run: az acr login --name ${{ env.ACR }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ACR }}/loverace/${{ matrix.service.name }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.ACR }}/loverace/${{ matrix.service.name }}:buildcache
          cache-to:   type=registry,ref=${{ env.ACR }}/loverace/${{ matrix.service.name }}:buildcache,mode=max

  deploy:
    name: Deploy to AKS
    runs-on: ubuntu-latest
    needs: build-push
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group ${{ env.RG }} \
            --name ${{ env.AKS }} \
            --overwrite-existing

      - name: Apply namespace
        run: kubectl apply -f infra/k8s/namespace.yaml

      - name: Apply Key Vault CSI SecretProviderClass
        run: kubectl apply -f infra/k8s/keyvault-csi.yaml

      - name: Apply core-api manifests
        run: |
          kubectl apply -f services/core_api/k8s/configmap.yaml
          kubectl apply -f services/core_api/k8s/deployment.yaml
          kubectl apply -f services/core_api/k8s/service.yaml
          kubectl apply -f services/core_api/k8s/hpa.yaml

      - name: Apply realtime-gateway manifests
        run: |
          kubectl apply -f services/realtime_gateway/k8s/configmap.yaml
          kubectl apply -f services/realtime_gateway/k8s/deployment.yaml
          kubectl apply -f services/realtime_gateway/k8s/service.yaml
          kubectl apply -f services/realtime_gateway/k8s/hpa.yaml

      - name: Apply ingress
        run: kubectl apply -f infra/k8s/ingress.yaml

      - name: Rollout status
        run: |
          kubectl rollout status deployment/core-api -n loverace --timeout=120s
          kubectl rollout status deployment/realtime-gateway -n loverace --timeout=120s
