apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: {{ .Values.certManager.email | quote }}
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - dns01:
          azureDNS:
            subscriptionID: {{ .Values.certManager.subscriptionId | quote }}
            resourceGroupName: {{ .Values.certManager.resourceGroup | quote }}
            hostedZoneName: {{ .Values.certManager.hostedZoneName | quote }}
            environment: AzurePublicCloud
            managedIdentity:
              clientID: {{ .Values.certManager.managedIdentityClientId | quote }}
