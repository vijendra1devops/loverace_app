apiVersion: v1
kind: ConfigMap
metadata:
  name: loverace-sql
  namespace: loverace
data:
  001_init.sql: |-
    -- ============================================================
    -- Loverace – Schema init (001)
    -- Run after enabling the postgis extension on your database.
    -- ============================================================

    CREATE EXTENSION IF NOT EXISTS postgis;
    CREATE EXTENSION IF NOT EXISTS "uuid-ossp";

    -- ----------------------------------------------------------
    -- users
    -- ----------------------------------------------------------
    CREATE TABLE IF NOT EXISTS users (
        id            UUID         PRIMARY KEY DEFAULT uuid_generate_v4(),
        email         VARCHAR(255) UNIQUE NOT NULL,
        phone_hash    VARCHAR(255) UNIQUE,
        password_hash VARCHAR(255) NOT NULL,
        status        VARCHAR(20)  NOT NULL DEFAULT 'active'
                                   CHECK (status IN ('active', 'suspended', 'deleted')),
        is_verified   BOOLEAN      NOT NULL DEFAULT FALSE,
        created_at    TIMESTAMPTZ  NOT NULL DEFAULT NOW(),
        last_active   TIMESTAMPTZ  NOT NULL DEFAULT NOW()
    );

    -- ----------------------------------------------------------
    -- profiles  (14+ user-facing fields)
    -- ----------------------------------------------------------
    CREATE TABLE IF NOT EXISTS profiles (
        user_id            UUID         PRIMARY KEY REFERENCES users(id) ON DELETE CASCADE,
        display_name       VARCHAR(100) NOT NULL,
        date_of_birth      DATE         NOT NULL,
        gender_identity    VARCHAR(100),
        pronouns           VARCHAR(100),
        sexual_orientation TEXT[]       NOT NULL DEFAULT '{}',
        looking_for        TEXT[]       NOT NULL DEFAULT '{}',
        bio                TEXT,
        photos             JSONB        NOT NULL DEFAULT '[]',
        interests          JSONB        NOT NULL DEFAULT '[]',
        height_cm          INTEGER      CHECK (height_cm BETWEEN 100 AND 250),
        education          VARCHAR(200),
        job_title          VARCHAR(200),
        languages          TEXT[]       NOT NULL DEFAULT '{}',
        smoking            VARCHAR(30)  CHECK (smoking IN ('never','sometimes','regularly','prefer_not_to_say')),
        drinking           VARCHAR(30)  CHECK (drinking IN ('never','socially','regularly','prefer_not_to_say')),
        privacy_settings   JSONB        NOT NULL DEFAULT '{}',
        preferences        JSONB        NOT NULL DEFAULT '{}',
        updated_at         TIMESTAMPTZ  NOT NULL DEFAULT NOW()
    );

    -- ----------------------------------------------------------
    -- user_settings
    -- ----------------------------------------------------------
    CREATE TABLE IF NOT EXISTS user_settings (
        user_id               UUID        PRIMARY KEY REFERENCES users(id) ON DELETE CASCADE,
        sound_enabled         BOOLEAN     NOT NULL DEFAULT TRUE,
        vibrate_enabled       BOOLEAN     NOT NULL DEFAULT TRUE,
        reduce_motion         BOOLEAN     NOT NULL DEFAULT FALSE,
        show_online_status    BOOLEAN     NOT NULL DEFAULT TRUE,
        notifications_enabled BOOLEAN     NOT NULL DEFAULT TRUE,
        updated_at            TIMESTAMPTZ NOT NULL DEFAULT NOW()
    );

    -- ----------------------------------------------------------
    -- locations  (PostGIS geography)
    -- ----------------------------------------------------------
    CREATE TABLE IF NOT EXISTS locations (
        user_id    UUID         PRIMARY KEY REFERENCES users(id) ON DELETE CASCADE,
        geom       GEOGRAPHY(POINT, 4326) NOT NULL,
        accuracy_m INTEGER,
        visibility VARCHAR(15)  NOT NULL DEFAULT 'approximate'
                                CHECK (visibility IN ('public', 'approximate', 'hidden')),
        updated_at TIMESTAMPTZ  NOT NULL DEFAULT NOW()
    );

    -- ----------------------------------------------------------
    -- swipes
    -- ----------------------------------------------------------
    CREATE TABLE IF NOT EXISTS swipes (
        id           UUID        PRIMARY KEY DEFAULT uuid_generate_v4(),
        from_user_id UUID        NOT NULL REFERENCES users(id) ON DELETE CASCADE,
        to_user_id   UUID        NOT NULL REFERENCES users(id) ON DELETE CASCADE,
        direction    VARCHAR(10) NOT NULL CHECK (direction IN ('like', 'dislike', 'superlike')),
        source       VARCHAR(10) NOT NULL DEFAULT 'feed' CHECK (source IN ('radar', 'feed')),
        created_at   TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        UNIQUE (from_user_id, to_user_id)
    );

    -- ----------------------------------------------------------
    -- matches  (user_a < user_b enforced in application layer)
    -- ----------------------------------------------------------
    CREATE TABLE IF NOT EXISTS matches (
        id           UUID        PRIMARY KEY DEFAULT uuid_generate_v4(),
        user_a_id    UUID        NOT NULL REFERENCES users(id) ON DELETE CASCADE,
        user_b_id    UUID        NOT NULL REFERENCES users(id) ON DELETE CASCADE,
        matched_at   TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        is_active    BOOLEAN     NOT NULL DEFAULT TRUE,
        blocked_by_a BOOLEAN     NOT NULL DEFAULT FALSE,
        blocked_by_b BOOLEAN     NOT NULL DEFAULT FALSE,
        UNIQUE (user_a_id, user_b_id)
    );

    -- ----------------------------------------------------------
    -- blocked_users
    -- ----------------------------------------------------------
    CREATE TABLE IF NOT EXISTS blocked_users (
        blocker_id UUID        NOT NULL REFERENCES users(id) ON DELETE CASCADE,
        blocked_id UUID        NOT NULL REFERENCES users(id) ON DELETE CASCADE,
        created_at TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        PRIMARY KEY (blocker_id, blocked_id)
    );

  002_conversations.sql: |-
    -- ============================================================
    -- Loverace – Conversations & Bond system (002)
    -- ============================================================

    -- ----------------------------------------------------------
    -- conversations  (one per match)
    -- ----------------------------------------------------------
    CREATE TABLE IF NOT EXISTS conversations (
        id         UUID        PRIMARY KEY DEFAULT uuid_generate_v4(),
        match_id   UUID        UNIQUE NOT NULL REFERENCES matches(id) ON DELETE CASCADE,
        created_at TIMESTAMPTZ NOT NULL DEFAULT NOW()
    );

    -- ----------------------------------------------------------
    -- messages
    -- ----------------------------------------------------------
    CREATE TABLE IF NOT EXISTS messages (
        id              UUID        PRIMARY KEY DEFAULT uuid_generate_v4(),
        conversation_id UUID        NOT NULL REFERENCES conversations(id) ON DELETE CASCADE,
        sender_id       UUID        NOT NULL REFERENCES users(id) ON DELETE CASCADE,
        text            TEXT        NOT NULL,
        media_url       TEXT,
        counted         BOOLEAN     NOT NULL DEFAULT FALSE,   -- TRUE if this msg scored XP
        created_at      TIMESTAMPTZ NOT NULL DEFAULT NOW()
    );

    -- ----------------------------------------------------------
    -- bond_progress  (per user per conversation)
    -- ----------------------------------------------------------
    CREATE TABLE IF NOT EXISTS bond_progress (
        conversation_id      UUID        NOT NULL REFERENCES conversations(id) ON DELETE CASCADE,
        user_id              UUID        NOT NULL REFERENCES users(id) ON DELETE CASCADE,
        stage                INTEGER     NOT NULL DEFAULT 1 CHECK (stage BETWEEN 1 AND 4),
        stage_xp             INTEGER     NOT NULL DEFAULT 0  CHECK (stage_xp >= 0),
        level                INTEGER     NOT NULL DEFAULT 1  CHECK (level BETWEEN 1 AND 101),
        pending_confirmation BOOLEAN     NOT NULL DEFAULT FALSE,
        confirmed_upgrade    BOOLEAN     NOT NULL DEFAULT FALSE,
        last_updated         TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        PRIMARY KEY (conversation_id, user_id)
    );

    -- ----------------------------------------------------------
    -- bond_vocab  (words already counted per user per conversation)
    -- ----------------------------------------------------------
    CREATE TABLE IF NOT EXISTS bond_vocab (
        conversation_id UUID        NOT NULL REFERENCES conversations(id) ON DELETE CASCADE,
        user_id         UUID        NOT NULL REFERENCES users(id) ON DELETE CASCADE,
        word            VARCHAR(150) NOT NULL,
        created_at      TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        PRIMARY KEY (conversation_id, user_id, word)
    );

    -- ----------------------------------------------------------
    -- bond_rate_limit  (10-second lock per user per conversation)
    -- ----------------------------------------------------------
    CREATE TABLE IF NOT EXISTS bond_rate_limit (
        conversation_id UUID        NOT NULL REFERENCES conversations(id) ON DELETE CASCADE,
        user_id         UUID        NOT NULL REFERENCES users(id) ON DELETE CASCADE,
        last_counted_at TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        PRIMARY KEY (conversation_id, user_id)
    );

  003_postgis_indexes.sql: |-
    -- ============================================================
    -- Loverace – Indexes & helper triggers (003)
    -- Run AFTER 001 and 002.
    -- ============================================================

    -- Spatial index for radar proximity queries
    CREATE INDEX IF NOT EXISTS idx_locations_geom
        ON locations USING GIST(geom);

    -- User lookup
    CREATE INDEX IF NOT EXISTS idx_users_email
        ON users(email);
    CREATE INDEX IF NOT EXISTS idx_users_last_active
        ON users(last_active DESC);

    -- Swipe lookups
    CREATE INDEX IF NOT EXISTS idx_swipes_from_user
        ON swipes(from_user_id);
    CREATE INDEX IF NOT EXISTS idx_swipes_to_user
        ON swipes(to_user_id);

    -- Match lookups
    CREATE INDEX IF NOT EXISTS idx_matches_user_a
        ON matches(user_a_id);
    CREATE INDEX IF NOT EXISTS idx_matches_user_b
        ON matches(user_b_id);

    -- Chat lookups
    CREATE INDEX IF NOT EXISTS idx_messages_conversation
        ON messages(conversation_id, created_at DESC);

    -- Bond vocab lookups
    CREATE INDEX IF NOT EXISTS idx_bond_vocab_conv_user
        ON bond_vocab(conversation_id, user_id);

    -- Bond progress lookups
    CREATE INDEX IF NOT EXISTS idx_bond_progress_conv
        ON bond_progress(conversation_id);

    -- ============================================================
    -- Auto-update last_active when a user updates their location
    -- ============================================================
    CREATE OR REPLACE FUNCTION fn_touch_last_active()
    RETURNS TRIGGER AS $$
    BEGIN
        UPDATE users SET last_active = NOW() WHERE id = NEW.user_id;
        RETURN NEW;
    END;
    $$ LANGUAGE plpgsql;

    DROP TRIGGER IF EXISTS trg_location_touch_active ON locations;
    CREATE TRIGGER trg_location_touch_active
        AFTER INSERT OR UPDATE ON locations
        FOR EACH ROW EXECUTE FUNCTION fn_touch_last_active();

    -- ============================================================
    -- Auto-update profiles.updated_at
    -- ============================================================
    CREATE OR REPLACE FUNCTION fn_set_updated_at()
    RETURNS TRIGGER AS $$
    BEGIN
        NEW.updated_at = NOW();
        RETURN NEW;
    END;
    $$ LANGUAGE plpgsql;

    DROP TRIGGER IF EXISTS trg_profiles_updated_at ON profiles;
    CREATE TRIGGER trg_profiles_updated_at
        BEFORE UPDATE ON profiles
        FOR EACH ROW EXECUTE FUNCTION fn_set_updated_at();

    DROP TRIGGER IF EXISTS trg_bond_progress_updated ON bond_progress;
    CREATE TRIGGER trg_bond_progress_updated
        BEFORE UPDATE ON bond_progress
        FOR EACH ROW EXECUTE FUNCTION fn_set_updated_at();
