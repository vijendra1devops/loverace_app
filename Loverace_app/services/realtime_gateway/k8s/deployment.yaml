apiVersion: apps/v1
kind: Deployment
metadata:
  name: realtime-gateway
  namespace: loverace
  labels:
    app: realtime-gateway
    tier: backend
spec:
  # Single worker per pod (WebSocket state is in-process).
  # Scale by adding replicas + use sticky sessions in the Ingress.
  replicas: 2
  selector:
    matchLabels:
      app: realtime-gateway
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: realtime-gateway
        tier: backend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      # Ensure graceful WS drain on pod termination
      terminationGracePeriodSeconds: 30
      containers:
        - name: realtime-gateway
          image: <YOUR_ACR>.azurecr.io/loverace/realtime-gateway:latest  # Replace with your ACR
          imagePullPolicy: Always
          ports:
            - containerPort: 8001
          envFrom:
            - configMapRef:
                name: realtime-gateway-config
            - secretRef:
                name: realtime-gateway-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 20
            periodSeconds: 20
            failureThreshold: 3
          volumeMounts:
            - name: kv-secrets
              mountPath: /mnt/kv-secrets
              readOnly: true
      volumes:
        - name: kv-secrets
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: kv-realtime-gateway
      # AKS kubelet managed identity handles ACR pull — no imagePullSecrets needed.
