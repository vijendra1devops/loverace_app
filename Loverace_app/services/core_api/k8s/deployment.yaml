apiVersion: apps/v1
kind: Deployment
metadata:
  name: core-api
  namespace: loverace
  labels:
    app: core-api
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: core-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: core-api
        tier: backend
    spec:
      # Run as non-root (matches Dockerfile USER appuser)
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: core-api
          image: <YOUR_ACR>.azurecr.io/loverace/core-api:latest  # Replace with your ACR
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: core-api-config
            - secretRef:
                name: core-api-secrets
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 20
            failureThreshold: 3
          # Mount Key Vault CSI volume so the SecretProviderClass syncs
          # core-api-secrets into a native k8s Secret (used by envFrom above).
          volumeMounts:
            - name: kv-secrets
              mountPath: /mnt/kv-secrets
              readOnly: true
      volumes:
        - name: kv-secrets
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: kv-core-api
      # AKS kubelet managed identity handles ACR pull — no imagePullSecrets needed
      # when AcrPull role is assigned to the kubelet identity (done in aks.bicep).
