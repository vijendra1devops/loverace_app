# core_api – Secret
# In production: this Secret is created automatically by the Key Vault CSI
# SecretProviderClass (infra/k8s/keyvault-csi.yaml).  Do NOT apply this file
# in production.  It is kept only for local development with docker-compose.
#
# For local dev: kubectl apply -f this file
# For AKS prod:  apply infra/k8s/keyvault-csi.yaml — CSI driver creates the secret.
apiVersion: v1
kind: Secret
metadata:
  name: core-api-secrets
  namespace: loverace
  annotations:
    managed-by: "keyvault-csi-in-prod"
type: Opaque
stringData:
  DATABASE_URL: "postgresql+asyncpg://loverace:CHANGE_ME@pg-loverace-prod.postgres.database.azure.com/loverace?ssl=require"
  ASYNCPG_URL:  "postgresql://loverace:CHANGE_ME@pg-loverace-prod.postgres.database.azure.com/loverace?ssl=require"
  JWT_SECRET:   "CHANGE_ME_32_CHARS_MINIMUM"
  STORAGE_ACCOUNT_NAME: "stlovearaceprod"
  STORAGE_KEY:  "CHANGE_ME"
