# ── cert-manager ClusterIssuer (Let's Encrypt via Azure DNS-01) ───────────────
# Install cert-manager first:
#   helm repo add jetstack https://charts.jetstack.io
#   helm install cert-manager jetstack/cert-manager \
#     -n cert-manager --create-namespace \
#     --set installCRDs=true \
#     --set podLabels."azure\.workload\.identity/use"=true \
#     --set serviceAccount.labels."azure\.workload\.identity/use"=true
#
# REPLACE: email, subscriptionID, resourceGroupName, hostedZoneName, clientID
# ─────────────────────────────────────────────────────────────────────────────

---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: devops@loverace.app       # REPLACE
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - dns01:
          azureDNS:
            subscriptionID: "<SUBSCRIPTION_ID>"    # REPLACE
            resourceGroupName: "rg-dns"            # REPLACE — RG where DNS zone lives
            hostedZoneName: "loverace.app"         # REPLACE
            environment: AzurePublicCloud
            managedIdentity:
              clientID: "<CERT_MANAGER_MANAGED_IDENTITY_CLIENT_ID>"  # REPLACE
