services:

  # ── PostgreSQL + PostGIS ────────────────────────────────────────────────────
  postgres:
    image: postgis/postgis:15-3.3
    container_name: loverace-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     loverace
      POSTGRES_PASSWORD: pass
      POSTGRES_DB:       loverace
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../sql:/docker-entrypoint-initdb.d   # auto-runs 001, 002, 003 on first start
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U loverace"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO (S3-compatible object storage) ────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: loverace-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO Console UI
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Microservice A — core_api (REST, port 8000) ────────────────────────────
  core_api:
    build:
      context: ../services/core_api
      dockerfile: Dockerfile
    container_name: loverace-core-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ../services/core_api/.env.example   # copy to .env and fill in prod values
    environment:
      DATABASE_URL:  postgresql+asyncpg://loverace:pass@postgres/loverace
      ASYNCPG_URL:   postgresql://loverace:pass@postgres/loverace
      S3_ENDPOINT:   http://minio:9000
    depends_on:
      - postgres
      - minio

  # ── Microservice B — realtime_gateway (WebSocket, port 8001) ───────────────
  realtime_gateway:
    build:
      context: ../services/realtime_gateway
      dockerfile: Dockerfile
    container_name: loverace-realtime-gateway
    restart: unless-stopped
    ports:
      - "8001:8001"
    env_file:
      - ../services/realtime_gateway/.env
    environment:
      ASYNCPG_URL: postgresql://loverace:pass@postgres/loverace
    depends_on:
      - postgres

  # ── Frontend UI (port 9092) ────────────────────────────────────────────────
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8000
        VITE_WS_URL: ws://localhost:8001
        VITE_MAP_STYLE_URL: https://tiles.openfreemap.org/styles/liberty
        VITE_DUMMY_DATA: false
    container_name: loverace-frontend
    restart: unless-stopped
    ports:
      - "9092:80"
    depends_on:
      - core_api
      - realtime_gateway
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  minio_data:
