name: Terraform Infrastructure

on:
  push:
    branches:
      - 'features/**'
      - main
    paths:
      - 'terraform_Infra/**'
      - '.github/workflows/terraform-infra.yml'
  pull_request:
    branches:
      - 'features/**'
      - main
    paths:
      - 'terraform_Infra/**'
      - '.github/workflows/terraform-infra.yml'

permissions:
  id-token: write
  contents: read

env:
  TF_WORKING_DIR: terraform_Infra/environment/dev

jobs:
  plan:
    name: Terraform plan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && startsWith(github.ref, 'refs/heads/features/'))

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.6.0

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: |
            {
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}"
            }

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init \
            -backend-config="resource_group_name=backend-rg" \
            -backend-config="storage_account_name=devbackendstg" \
            -backend-config="container_name=my-backend-cnt" \
            -backend-config="key=terraform.tfstate"

      - name: Terraform plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform plan -var-file=terraform.tfvars

  deploy:
    name: Terraform deploy
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: 'dev'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.6.0

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: |
            {
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}"
            }

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init \
            -backend-config="resource_group_name=backend-rg" \
            -backend-config="storage_account_name=devbackendstg" \
            -backend-config="container_name=my-backend-cnt" \
            -backend-config="key=terraform.tfstate"

      - name: Terraform apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve -var-file=terraform.tfvars
