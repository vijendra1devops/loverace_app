name: CI - Build & Push Docker Images

on:
  push:
    branches:
      - main
      - 'feature/**'

  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  # ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}


jobs:

  build:
    name: Build - ${{ matrix.service }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - service: frontend
            context: ./Loverace_app/frontend
            image: loverace-frontend

          - service: core_api
            context: ./Loverace_app/services/core_api
            image: loverace-core-api

          - service: realtime_gateway
            context: ./Loverace_app/services/realtime_gateway
            image: loverace-realtime-gateway

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      # - name: Azure Login
      #   if: github.ref == 'refs/heads/main'
      #   uses: azure/login@v2
      #   with:
      #     creds: |
      #       {
      #         "clientId":"${{ secrets.AZURE_CLIENT_ID }}",
      #         "clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}",
      #         "subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}",
      #         "tenantId":"${{ secrets.AZURE_TENANT_ID }}"
      #       }

      # - name: ACR Login
      #   if: github.ref == 'refs/heads/main'
      #   run: az acr login --name ${{ env.ACR_LOGIN_SERVER }}
    
      - name: DockerHub Login
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}

          push: ${{ github.ref == 'refs/heads/main' }}

          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:latest
            
            

          build-args: |
            VITE_API_URL=https://${{ vars.API_DOMAIN }}
            VITE_WS_URL=wss://${{ vars.WSAPI_DOMAIN }}

          cache-from: type=gha
          cache-to: type=gha,mode=max