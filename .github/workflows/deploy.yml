name: Deploy to AKS

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag to deploy"
        required: false
        default: "latest"

  workflow_run:
    workflows:
      - "CI - Build & Push Docker Images"
    types:
      - completed

permissions:
  contents: read

jobs:
  deploy:
    name: Helm upgrade - AKS
    runs-on: ubuntu-latest

    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main'
      )

    environment: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.image_tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.event.workflow_run.head_sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: |
            {
              "clientId":"${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}",
              "subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}",
              "tenantId":"${{ secrets.AZURE_TENANT_ID }}"
            }

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group "${{ secrets.AKS_RESOURCE_GROUP }}" \
            --name "${{ secrets.AKS_CLUSTER_NAME }}" \
            --overwrite-existing

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Install cert-manager CRDs
        run: |
          kubectl apply -f https://github.com/cert-manager/cert-manager/releases/latest/download/crds.yaml --server-side

      - name: Install cert-manager
        run: |
          helm repo add jetstack https://charts.jetstack.io
          helm repo update

          helm upgrade --install cert-manager jetstack/cert-manager \
            --namespace cert-manager \
            --create-namespace \
            --set installCRDs=false \
            --wait \
            --timeout 5m

      - name: Helm upgrade
        run: |
          helm upgrade --install loverace ./chart \
            --namespace loverace \
            --create-namespace \
            --values chart/values.yaml \
            --set imageTag="${{ steps.tag.outputs.tag }}" \
            --set acrLoginServer="${{ secrets.ACR_LOGIN_SERVER }}" \
            --set apiDomain="${{ vars.API_DOMAIN }}" \
            --set keyvault.name="${{ secrets.KEYVAULT_NAME }}" \
            --set keyvault.tenantId="${{ secrets.TENANT_ID }}" \
            --set keyvault.subscriptionId="${{ secrets.SUBSCRIPTION_ID }}" \
            --set certManager.email="${{ vars.CERT_MANAGER_EMAIL }}" \
            --set certManager.subscriptionId="${{ secrets.SUBSCRIPTION_ID }}" \
            --set certManager.resourceGroup="${{ vars.DNS_RESOURCE_GROUP }}" \
            --set certManager.hostedZoneName="${{ vars.API_DOMAIN }}" \
            --set certManager.managedIdentityClientId="${{ secrets.CERT_MANAGER_MI_CLIENT_ID }}" \
            --set core_api.image.repository="${{ secrets.ACR_LOGIN_SERVER }}/loverace-core-api" \
            --set core_api.image.tag="${{ steps.tag.outputs.tag }}" \
            --set realtime_gateway.image.repository="${{ secrets.ACR_LOGIN_SERVER }}/loverace-realtime-gateway" \
            --set realtime_gateway.image.tag="${{ steps.tag.outputs.tag }}" \
            --set frontend.origin="https://${{ vars.FRONTEND_ORIGIN }}" \
            --atomic \
            --timeout 10m

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/core-api -n loverace --timeout=5m
          kubectl rollout status deployment/realtime-gateway -n loverace --timeout=5m