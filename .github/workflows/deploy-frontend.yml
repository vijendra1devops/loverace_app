name: Deploy Frontend - App Service

on:
  push:
    branches:
      - main

    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'

  workflow_dispatch:

permissions:
  contents: read

env:
  ACR: ${{ secrets.ACR_LOGIN_SERVER }}
  APP_NAME: ${{ secrets.AZURE_WEBAPP_NAME }}
  RG: ${{ secrets.AZURE_RESOURCE_GROUP }}
  IMAGE: ${{ secrets.ACR_LOGIN_SERVER }}/loverace/frontend

jobs:
  build-push-deploy:
    name: Build Push Deploy
    runs-on: ubuntu-latest

    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: |
            {
              "clientId":"${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}",
              "subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}",
              "tenantId":"${{ secrets.AZURE_TENANT_ID }}"
            }

      - name: ACR Login
        run: az acr login --name ${{ env.ACR }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: frontend
          push: true
          tags: ${{ steps.meta.outputs.tags }}

          cache-from: type=registry,ref=${{ env.IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE }}:buildcache,mode=max

          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
            VITE_WS_URL=${{ secrets.VITE_WS_URL }}
            VITE_MAP_STYLE_URL=https://tiles.openfreemap.org/styles/liberty
            VITE_DUMMY_DATA=false

      - name: Update App Service Container
        run: |
          az webapp config container set \
            --name ${{ env.APP_NAME }} \
            --resource-group ${{ env.RG }} \
            --docker-custom-image-name ${{ env.IMAGE }}:latest \
            --docker-registry-server-url https://${{ env.ACR }}

      - name: Restart App Service
        run: |
          az webapp restart \
            --name ${{ env.APP_NAME }} \
            --resource-group ${{ env.RG }}

      - name: Check App Service
        run: |
          az webapp show \
            --name ${{ env.APP_NAME }} \
            --resource-group ${{ env.RG }} \
            --query "state" -o tsv